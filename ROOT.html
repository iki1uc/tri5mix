<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>tri5mix / ROOT – FINAL</title>

<style>
body { background:#000; color:#0f0; font-family:monospace; }
h1, h2 { color:#6cf; }
button {
    padding:8px 14px;
    background:#111;
    color:#0f0;
    border:1px solid #333;
    cursor:pointer;
    width:120px;
    margin:4px;
}
button:hover { background:#222; }
pre {
    background:#000;
    border:1px solid #333;
    padding:10px;
    width:260px;
}
</style>
</head>

<body>

<h1>tri5mix / ROOT</h1>

<h2>ID</h2>
<pre id="triID">Noch keine ID.</pre>

<script>
// ------------------------------
// ID‑System
// ------------------------------
function setID(axis){
    const map = {
        A1: { core:"IKI", pos:"(1, Φ)", code:"Φ" },
        A2: { core:"BIR", pos:"(2, φ)", code:"φ" },
        A3: { core:"UC",  pos:"(3, φ²)", code:"φ²" },
        A4: { core:"MA³", pos:"(4, φ∞)", code:"φ∞" },
        A5: { core:"RAW", pos:"(5, RAW)", code:"RAW" }
    };

    const id = map[axis];

    document.getElementById("triID").innerText =
        "CORE = " + id.core + "\n" +
        "pos(CORE) = " + id.pos + "\n" +
        "code = " + id.code + "\n" +
        "axis = " + axis + "\n";
}

// ------------------------------
// FINAL: Fehler‑System
// Kein GitHub‑Error, kein Browser‑Error
// ------------------------------
function tri5mixAxis(axis){

    // Erfolg: ID setzen
    setID(axis);

    // Fehler‑Schalter (du entscheidest)
    // false = KEIN Fehler
    // true  = Fehler → ERRORMETER
    const error = false;

    if(error){
        const idText = document.getElementById("triID").innerText.split("\n");

        const core = idText[0].replace("CORE = ","");
        const pos  = idText[1].replace("pos(CORE) = ","");
        const code = idText[2].replace("code = ","");

        window.location.href =
            "error.html"
            + "?from=ROOT"
            + "&axis=" + axis
            + "&core=" + core
            + "&pos="  + pos
            + "&code=" + code
            + "&id="   + axis + "-ERR"
            + "&mode=NC"
            + "&hint=ROOT+Fehler";
    }
}
</script>

<!-- ------------------------------ -->
<!-- FINAL: Buttons (keine Form!)   -->
<!-- ------------------------------ -->
<button onclick="tri5mixAxis('A1')">A1</button>
<button onclick="tri5mixAxis('A2')">A2</button>
<button onclick="tri5mixAxis('A3')">A3</button>
<button onclick="tri5mixAxis('A4')">A4</button>
<button onclick="tri5mixAxis('A5')">A5</button>

</body>
</html>
