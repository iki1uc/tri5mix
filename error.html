<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>tri5mix – AXIOM ERRORMETER</title>

<style>
body { background:#000; color:#f33; font-family:monospace; padding:20px; }
h1 { color:#f55; }
.box { background:#100; padding:20px; border:1px solid #f33; border-radius:8px; margin-bottom:20px; }
pre { background:#000; border:1px solid #333; padding:10px; color:#faa; }
</style>
</head>

<body>

<h1>tri5mix – AXIOM ERRORMETER</h1>

<div class="box">
<strong>Fehler:</strong>
<p id="msg">Kein Fehler empfangen.</p>
</div>

<div class="box">
<strong>AXIOM‑Lage:</strong>
<pre id="axiom">Lade…</pre>
</div>

<script>
const p = new URLSearchParams(window.location.search);

document.getElementById("msg").innerText =
    p.get("hint") || p.get("msg") || "Unbekannter Fehler";

document.getElementById("axiom").innerText =
    "FROM = " + (p.get("from") || "none") + "\n" +
    "AXIS = " + (p.get("axis") || "none") + "\n" +
    "CORE = " + (p.get("core") || "none") + "\n" +
    "POS  = " + (p.get("pos")  || "none") + "\n" +
    "CODE = " + (p.get("code") || "none") + "\n" +
    "MODE = " + (p.get("mode") || "none") + "\n" +
    "ID   = " + (p.get("id")   || "none") + "\n";
</script>

</body>
</html>
