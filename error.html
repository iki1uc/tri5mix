<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>tri5mix – ERRORMETER</title>

<style>
    body { background:#000; color:#f33; font-family:monospace; padding:20px; }
    h1 { color:#f55; }
    .box {
        background:#100;
        padding:20px;
        border:1px solid #f33;
        border-radius:8px;
        margin-bottom:20px;
    }
    .info {
        color:#faa;
        margin-top:10px;
        font-size:14px;
    }
    a { color:#6cf; }
</style>
</head>

<body>

<h1>tri5mix – ERRORMETER</h1>

<div class="box">
    <p><strong>Fehler:</strong></p>
    <p id="msg">Kein Fehler empfangen.</p>
</div>

<div class="box">
    <p><strong>System‑Daten:</strong></p>
    <pre id="sys">Lade…</pre>
</div>

<script>
// Fehler aus URL lesen
const params = new URLSearchParams(window.location.search);
const msg = params.get("hint") || params.get("msg") || "Unbekannter Fehler";
document.getElementById("msg").innerText = msg;

// Systemdaten aus URL lesen
const sys = {
    from:   params.get("from")   || "none",
    active: params.get("active") || "none",
    id:     params.get("id")     || "none",
    eich:   params.get("eich")   || "none",
    gen:    params.get("gen")    || "none",
    tech:   params.get("tech")   || "none",
    ort:    params.get("ort")    || "none",
    mode:   params.get("mode")   || "none"
};

document.getElementById("sys").innerText =
    "FROM  = " + sys.from   + "\n" +
    "ACTIVE= " + sys.active + "\n" +
    "ID    = " + sys.id     + "\n" +
    "EICH  = " + sys.eich   + "\n" +
    "GEN   = " + sys.gen    + "\n" +
    "TECH  = " + sys.tech   + "\n" +
    "ORT   = " + sys.ort    + "\n" +
    "MODE  = " + sys.mode   + "\n";
</script>

<div class="info">
    tri5mix ERRORMETER verarbeitet Fehler aus: ENGINE / ROOT / ID / DISPATCHER / A1–A5 / Φ / φ / φ² / φ∞ / RAW.
</div>

</body>
</html>
